{% extends 'delivery/base.html' %}

{% block title %}Add Restaurant | one8 Commune{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in" style="max-width: 500px;">
    <div class="card auth-card" style="text-align: left;">
        <div class="auth-header" style="text-align: center; margin-bottom: 2rem;">
            <h2>Add New Restaurant</h2>
            <p>Onboard a new restaurant to the platform</p>
        </div>

        <form action="{% url 'add_restaurant' %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Restaurant Name</label>
                <input type="text" name="name" class="form-control" required placeholder="E.g., The Great Indian Kitchen">
            </div>
            
            <div class="form-group">
                <label class="form-label">Picture URL</label>
                <input type="url" name="picture" class="form-control" placeholder="https://example.com/image.jpg">
            </div>
            
            <div class="form-group">
                <label class="form-label">Cuisine</label>
                <input type="text" name="cuisine" class="form-control" required placeholder="E.g., Indian, Chinese, Italian">
            </div>

            <div class="form-group">
                <label class="form-label">Initial Rating (0-5)</label>
                <input type="number" name="rating" class="form-control" min="0" max="5" step="0.5" required placeholder="4.5">
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <a href="{% url 'admin_home' %}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Add Restaurant</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
