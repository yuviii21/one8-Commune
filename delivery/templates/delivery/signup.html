{% extends 'delivery/base.html' %}

{% block title %}Sign Up | one8 Commune{% endblock %}

{% block extra_css %}
<style>
    .main-content { padding: 0 !important; max-width: none !important; margin: 0 !important; }
    .footer { display: none !important; }
    
    .split-layout { display: flex; min-height: calc(100vh - 74px); background: #000; }
    .split-image { flex: 1; background: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200&auto=format&fit=crop') center/cover; position: relative; display: none; }
    @media (min-width: 768px) { .split-image { display: block; } }
    .split-image::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 30%; background: linear-gradient(to right, transparent, #000); }
    
    .split-form { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-container { margin: 0; width: 100%; max-width: 400px; }
</style>
{% endblock %}

{% block content %}
<div class="split-layout">
    <div class="split-image"></div>
    <div class="split-form">
        <div class="auth-container animate-fade-in">
            <h2 class="auth-title">Register</h2>
            <form action="{% url 'signup' %}" method="post" class="auth-form-group">
                {% csrf_token %}
                <input type="text" name="username" class="auth-input" required placeholder="choose a username">
                <input type="email" name="email" class="auth-input" required placeholder="email address">
                <input type="text" name="mobile" class="auth-input" required placeholder="mobile number">
                <input type="text" name="address" class="auth-input" required placeholder="delivery address">
                <div class="auth-input-group">
                    <input type="password" name="password" class="auth-input" required placeholder="create password">
                    <span style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); color: #8b949e; font-size: 0.85rem; cursor: pointer;">Show</span>
                </div>
                <button type="submit" class="auth-submit">Create account</button>
            </form>
            
            <div class="auth-links">
                <p style="color: #8b949e; font-size: 0.95rem; margin-top: 1rem;">
                    Already have an account? <a href="{% url 'open_signin' %}" style="color: #ffffff; font-weight: 600;">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
