{% extends 'delivery/base.html' %}

{% block title %}Update Restaurant | one8 Commune{% endblock %}

{% block content %}
<div class="auth-container animate-fade-in" style="max-width: 500px;">
    <div class="card auth-card" style="text-align: left;">
        <div class="auth-header" style="text-align: center; margin-bottom: 2rem;">
            <h2>Update Restaurant</h2>
            <p>Modify restaurant details</p>
        </div>

        <form action="{% url 'update_restaurant' restaurant.id %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">Restaurant Name</label>
                <input type="text" name="name" class="form-control" value="{{restaurant.name}}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Picture URL</label>
                <input type="url" name="picture" class="form-control" value="{{restaurant.picture}}">
            </div>
            
            <div class="form-group">
                <label class="form-label">Cuisine</label>
                <input type="text" name="cuisine" class="form-control" value="{{restaurant.cuisine}}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Rating (0-5)</label>
                <input type="number" name="rating" class="form-control" min="0" max="5" step="0.5" value="{{restaurant.rating}}" required>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <a href="{% url 'open_show_restaurant' %}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Update Details</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
